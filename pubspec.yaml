name: oaya_flutter
description: "OAYA - Premium E-Commerce Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.0

  # State Management (Riverpod)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # Persistence
  shared_preferences: ^2.3.0

  # UI
  google_fonts: ^6.2.0
  feather_icons: ^1.2.0
  cached_network_image: ^3.4.0
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Payments
  flutter_stripe: ^11.3.0
  http: ^1.2.0

  # Notifications (FCM)
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/.env
